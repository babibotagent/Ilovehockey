name: Update Copa 2026 Scores

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  update-scores:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch scores and update static data
        run: |
          node scripts/update-scores.mjs

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git diff --quiet src/data/copa2026.ts && exit 0
          git add src/data/copa2026.ts
          git commit -m "Auto-update Copa 2026 scores [skip ci]"
          git push
